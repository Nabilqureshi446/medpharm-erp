apiVersion: apps/v1
kind: Deployment
metadata: 
 name: user-service
 labels:
  app: user-service
spec:
  startegies:
    type: RollingUpdate
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service   
    spec:
      containers:
      - name: user-service
        image:
        ports:
        - containerPort: 8081
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"