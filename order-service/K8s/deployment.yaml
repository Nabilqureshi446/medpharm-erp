apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service    
spec:
  strategies:
    type: RollingUpdate 
  replicas: 2
  selector:   
    matchLabels:
      app: order-service
  template:
    metadata: 
      labels:
        app: order-service  
    spec:
      containers: 
      - name: order-service
        image:
        ports:
        - containerPort: 8083
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m" 